name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version: ['29.4', '30.1']
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install dependencies
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(add-to-list 'package-archives '(\"gnu\"   . \"https://elpa.gnu.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(package-install 'denote)" \
            --eval "(package-install 'mcp-server-lib)"

      - name: Byte-compile
        run: |
          emacs -Q --batch \
            --eval "(progn (require 'package) (package-initialize))" \
            -L . \
            -f batch-byte-compile denote-mcp-tools.el denote-mcp.el

      - name: Run tests
        run: |
          emacs -Q --batch \
            --eval "(progn (require 'package) (package-initialize))" \
            -L . -L tests \
            -l tests/denote-mcp-tests.el \
            -f ert-run-tests-batch-and-exit
